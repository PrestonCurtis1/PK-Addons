<script>
document.addEventListener("DOMContentLoaded", async function() {
  const serversUrl = "https://raw.githubusercontent.com/CozmycDev/PK-Addons/main/servers.json";
  const latestUrl = "https://raw.githubusercontent.com/CozmycDev/PK-Addons/main/data/server_latest.json";
  const historyUrl = "https://raw.githubusercontent.com/CozmycDev/PK-Addons/main/data/server_history.json";

  const table = $('#servers-table').DataTable({ columnDefs:[{ targets:'_all', orderable:false }] });

  const [servers, latest, history] = await Promise.all([
    fetch(serversUrl).then(r => r.json()),
    fetch(latestUrl).then(r => r.json()),
    fetch(historyUrl + "?t=" + Date.now()).then(r => r.json())
  ]);

  const now = Date.now();
  const cutoff = now - 24 * 60 * 60 * 1000; // 24h cutoff
  const intervalMs = 15 * 60 * 1000; // 15 minutes

  let totalPlayers = 0;

  // Prepare totalSeriesMap for total sparkline
  const totalSeriesMap = new Map();

  servers.forEach(server => {
    const latestData = latest[server.name] || {};
    totalPlayers += latestData.players ?? 0;

    const discordLink = server.discord_invite
      ? `<a href="${server.discord_invite}" target="_blank">Join <i class="fa-brands fa-discord"></i></a>`
      : '<i class="fas fa-question-circle"></i>';

    const bedrockPort = server.bedrock_port
      ? `<i class="fas fa-check-circle"></i> ${server.bedrock_port}`
      : '<i class="fas fa-times"></i>';

    const ipCell = server.ip
      ? `<span class="copy-ip" data-ip="${server.ip}" style="cursor:pointer;">${server.ip} <i class="fas fa-clipboard"></i></span>`
      : '<i class="fas fa-question-circle"></i>';

    const row = table.row.add([
      server.name, ipCell, discordLink, bedrockPort,
      latestData.motd || '<i class="fas fa-question-circle"></i>',
      latestData.players ?? 0,
      latestData.max ?? "N/A",
      latestData.version ?? '<i class="fas fa-question-circle"></i>',
      `<canvas class="sparkline"></canvas>`
    ]).draw(false).node();

    const canvas = row.querySelector('canvas.sparkline');
    if(canvas){
      // Build a per-server Map keyed by rounded timestamp
      const seriesMap = new Map();
      (history[server.name] || []).forEach(d => {
        const t = Math.floor(d.time/intervalMs)*intervalMs;
        seriesMap.set(t, d.players);
        totalSeriesMap.set(t, (totalSeriesMap.get(t) || 0) + d.players);
      });

      // Pad series for missing intervals
      const paddedSeries = [];
      for(let t = cutoff; t <= now; t += intervalMs){
        paddedSeries.push({ time: t, players: seriesMap.get(t) ?? 0 });
      }

      const max24 = Math.max(...paddedSeries.map(d => d.players));

      new Chart(canvas.getContext("2d"), {
        type:"line",
        data:{
          datasets:[
            {
              label:"Online",
              data:paddedSeries.map(d=>({x:new Date(d.time),y:d.players})),
              borderColor:'#4bc0c0', backgroundColor:'rgba(75,192,192,0.1)',
              pointRadius:0, pointHitRadius:10, tension:0.3, borderWidth:1, fill:true
            },
            {
              label:"Max players",
              data:paddedSeries.map(d=>({x:new Date(d.time),y:latestData.max || 0})),
              borderColor:'#f54242', borderWidth:1, pointRadius:0,
              borderDash:[4,2], fill:false
            },
            {
              label:"Prev 24h max",
              data:paddedSeries.map(d=>({x:new Date(d.time),y:max24})),
              borderColor:'#f5a142', borderWidth:1, pointRadius:0,
              borderDash:[2,2], fill:false
            }
          ]
        },
        options:{
          responsive:false,
          interaction: { mode:'nearest', intersect:false },
          plugins:{
            legend:{ display:false },
            tooltip:{ mode:'nearest', intersect:false }
          },
          scales:{
            y:{ min:0, max: Math.max(latestData.max || 0, max24), display:false },
            x:{ display:false }
          }
        }
      });
    }
  });

  document.getElementById('total-players').textContent = totalPlayers;

  // Total players sparkline
  const totalCanvas = document.getElementById("total-sparkline");
  if(totalCanvas){
    const paddedTotal = [];
    for(let t = cutoff; t <= now; t += intervalMs){
      paddedTotal.push({ time: t, players: totalSeriesMap.get(t) ?? 0 });
    }

    new Chart(totalCanvas.getContext("2d"), {
      type:"line",
      data:{ datasets:[{
        data: paddedTotal.map(d=>({x:new Date(d.time),y:d.players})),
        borderColor:'#f5c542', backgroundColor:'rgba(245,197,66,0.2)',
        pointRadius:0, pointHitRadius:10, tension:0.4, fill:true
      }]},
      options:{
        responsive:false,
        interaction:{ mode:'nearest', intersect:false },
        plugins:{ legend:{ display:false }, tooltip:{ mode:'nearest', intersect:false } },
        scales:{ x:{ display:false }, y:{ display:false } }
      }
    });
  }

  $('#servers-table tbody').on('click','.copy-ip',function(){
    const ip=$(this).data('ip');
    navigator.clipboard.writeText(ip).then(()=>alert(`IP address ${ip} copied!`)).catch(console.error);
  });

});
</script>
